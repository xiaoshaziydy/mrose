<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mROSE Web Server</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8f5;
        color: #09251f;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(rgba(9, 37, 31, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(9, 37, 31, 0.045) 1px, transparent 1px),
          #f6f8f5;
        background-size: 28px 28px;
      }

      main {
        width: min(680px, calc(100vw - 40px));
        border: 1px solid #cad8d2;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 70px rgba(17, 46, 39, 0.14);
        padding: 38px;
      }

      .eyebrow {
        margin: 0 0 16px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
        color: #0b6b57;
      }

      h1 {
        margin: 0;
        font-size: clamp(38px, 8vw, 72px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 18px 0 0;
        max-width: 56ch;
        color: #52645f;
        font-size: 16px;
        line-height: 1.65;
      }

      a {
        color: #063f35;
        font-weight: 800;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 28px;
        padding: 12px 16px;
        border: 1px solid #cad8d2;
        border-radius: 999px;
        background: #ffffff;
        font-weight: 800;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ff755f;
        box-shadow: 0 0 0 6px rgba(255, 117, 95, 0.14);
      }

      code {
        overflow-wrap: anywhere;
        color: #09251f;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">mROSE dynamic entry</p>
      <h1>Opening mROSE</h1>
      <p id="message">Finding the current Cloudflare Quick Tunnel URL...</p>
      <div class="status" aria-live="polite"><span class="dot"></span><span id="status">Connecting</span></div>
    </main>
    <script>
      const fallbackUrl = "https://author-regard-transit-virtue.trycloudflare.com";

      function setManualLink(url, reason) {
        const message = document.getElementById("message");
        const status = document.getElementById("status");
        status.textContent = reason;
        message.innerHTML = `Current mROSE URL: <a href="${url}">${url}</a>`;
      }

      async function openLatest() {
        try {
          const response = await fetch(`latest-url.json?ts=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          const url = String(data.url || "").trim();
          if (!/^https:\/\/[-a-z0-9]+\.trycloudflare\.com$/i.test(url)) {
            throw new Error("Invalid tunnel URL");
          }
          setManualLink(url, "Redirecting");
          window.location.replace(url);
        } catch (error) {
          setManualLink(fallbackUrl, "Manual open");
        }
      }

      openLatest();
    </script>
  </body>
</html>
